<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omme — Asesor de Salud</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"><style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a08;
    --surface: #141410;
    --surface2: #1c1c18;
    --border: #2a2a24;
    --text: #e8e4d8;
    --text-muted: #7a7870;
    --text-dim: #4a4840;
    --accent: #c8973c;
    --accent-dim: #8a6428;
    --bubble-user: #1e1e1a;
    --bubble-agent: #141410;
    --input-bg: #1a1a16;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* Layout */
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 680px;
    margin: 0 auto;
    position: relative;
  }

  /* Header */
  .header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    background: var(--bg);
  }

  .logo-mark {
    width: 36px;
    height: 36px;
    border: 1px solid var(--accent-dim);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo-mark svg {
    width: 18px;
    height: 18px;
    fill: var(--accent);
  }

  .header-text h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: 0.01em;
  }

  .header-text p {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 300;
    letter-spacing: 0.02em;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    background: #4a9e6a;
    border-radius: 50%;
    margin-left: auto;
    flex-shrink: 0;
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Chat area */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  .chat::-webkit-scrollbar { width: 3px; }
  .chat::-webkit-scrollbar-track { background: transparent; }
  .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Messages */
  .msg {
    display: flex;
    flex-direction: column;
    max-width: 88%;
    animation: fadeUp 0.25s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.agent { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 13px 17px;
    border-radius: 2px;
    font-size: 14.5px;
    line-height: 1.65;
    position: relative;
  }

  .msg.user .bubble {
    background: var(--bubble-user);
    border: 1px solid var(--border);
    border-bottom-right-radius: 0;
    color: var(--text);
  }

  .msg.agent .bubble {
    background: var(--bubble-agent);
    border: 1px solid var(--border);
    border-bottom-left-radius: 0;
    color: var(--text);
  }

  .msg.agent .bubble::before {
    content: '';
    position: absolute;
    left: -1px;
    top: -1px;
    bottom: -1px;
    width: 2px;
    background: var(--accent-dim);
    border-radius: 2px 0 0 0;
  }

  .msg-time {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 5px;
    font-weight: 300;
    letter-spacing: 0.02em;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 14px 18px;
    background: var(--bubble-agent);
    border: 1px solid var(--border);
    border-bottom-left-radius: 0;
    width: fit-content;
    animation: fadeUp 0.2s ease forwards;
    opacity: 0;
    position: relative;
  }

  .typing::before {
    content: '';
    position: absolute;
    left: -1px;
    top: -1px;
    bottom: -1px;
    width: 2px;
    background: var(--accent-dim);
    border-radius: 2px 0 0 0;
  }

  .typing span {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: bounce 1.2s ease-in-out infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); background: var(--accent); }
  }

  /* Intro */
  .intro {
    text-align: center;
    padding: 40px 20px 20px;
    animation: fadeUp 0.4s ease forwards;
    opacity: 0;
    animation-delay: 0.1s;
  }

  .intro-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 42px;
    color: var(--accent);
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 10px;
  }

  .intro p {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 300;
    max-width: 280px;
    margin: 0 auto 28px;
    line-height: 1.7;
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 480px;
    margin: 0 auto;
  }

  .chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 12.5px;
    padding: 7px 14px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
  }

  .chip:hover {
    border-color: var(--accent-dim);
    color: var(--text);
    background: var(--surface);
  }

  /* Input area */
  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }

  .input-wrap {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 10px 14px;
    transition: border-color 0.15s;
  }

  .input-wrap:focus-within {
    border-color: var(--accent-dim);
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    resize: none;
    min-height: 22px;
    max-height: 120px;
    overflow-y: auto;
  }

  textarea::placeholder { color: var(--text-dim); }

  textarea::-webkit-scrollbar { width: 2px; }
  textarea::-webkit-scrollbar-thumb { background: var(--border); }

  .send-btn {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border: none;
    border-radius: 2px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    opacity: 0.9;
  }

  .send-btn:hover { opacity: 1; transform: scale(1.03); }
  .send-btn:active { transform: scale(0.97); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .send-btn svg {
    width: 15px;
    height: 15px;
    fill: #0a0a08;
  }

  .disclaimer {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 10px;
    letter-spacing: 0.01em;
  }

  /* Error */
  .error-bubble {
    background: #1a0e0e;
    border: 1px solid #3a1a1a;
    color: #c87a7a;
    padding: 12px 16px;
    border-radius: 2px;
    font-size: 13px;
    align-self: flex-start;
    max-width: 88%;
    animation: fadeUp 0.2s ease forwards;
    opacity: 0;
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="10" fill="none" stroke="#c8973c" stroke-width="1.5"/>
        <circle cx="12" cy="12" r="4"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>Omme</h1>
      <p>Asesor de salud capilar · Prototipo interno</p>
    </div>
    <div class="status-dot"></div>
  </div>

  <div class="chat" id="chat">
    <div class="intro" id="intro">
      <div class="intro-logo">omme</div>
      <p>Tratamiento médico, seguimiento real, cero tabú.</p>
      <div class="chips">
        <button class="chip" onclick="sendChip(this)">Llevo años perdiendo cabello</button>
        <button class="chip" onclick="sendChip(this)">¿Cuánto cuesta?</button>
        <button class="chip" onclick="sendChip(this)">Ya probé de todo y nada</button>
        <button class="chip" onclick="sendChip(this)">¿No tiene efectos secundarios?</button>
        <button class="chip" onclick="sendChip(this)">¿Por qué confiar en ustedes?</button>
        <button class="chip" onclick="sendChip(this)">Suena a marketing</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea
        id="input"
        placeholder="Escribe tu mensaje..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()" disabled>
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
    <p class="disclaimer">Prototipo interno · No compartir fuera del equipo</p>
  </div>

</div>

<script>
const SYSTEM_PROMPT = `Eres el Agente Advisor de Omme — el primer punto de contacto con hombres que están considerando tratar su pérdida de cabello.

Tu único trabajo: que el usuario quiera seguir hablando contigo y eventualmente dar el paso hacia la evaluación.

No explicas de más. No te pones defensivo. Escuchas, respondes poco, y dejas espacio para que el otro hable.

REGLA PRINCIPAL DE CONVERSACIÓN

Máximo 2 oraciones por mensaje. Siempre.

Si sientes que necesitas decir más, no lo digas. Guárdate la mitad para el siguiente turno — solo si el usuario pregunta más.

Termina tus mensajes con una pregunta corta que abra la conversación, o con silencio que invite a responder. Nunca termines con un párrafo cerrado.

Ejemplo de lo que NO debes hacer:
"La alopecia androgenética es causada por la DHT, que ataca los folículos en personas con predisposición genética. El folículo se miniaturiza progresivamente y con el tiempo deja de producir pelo. Por eso es importante actuar temprano porque los folículos muertos no se recuperan."

Ejemplo de lo que SÍ debes hacer:
"Es genética — la DHT ataca los folículos en personas predispuestas. ¿Llevas mucho tiempo notándolo?"

QUIÉN ERES

Un asesor de Omme. Inteligente, directo, sin rollo. No eres un vendedor ni un médico — eres alguien que entiende el tema y habla sin filtros.

Tono: como un amigo que sabe de esto y te habla de frente. Sin florituras, sin palabras de más.

CONTEXTO DE OMME

Omme ofrece programas de tratamiento de 6 y 12 meses: evaluación médica, tratamiento personalizado, medicamento en casa y seguimiento mensual con especialistas reales.

Tratamiento base: Minoxidil oral 5mg + Dutasterida 0.5mg. Solo para pacientes que pasan screening.

Precio: $799 pesos al mes. Planes de 6 o 12 meses.

Evaluación inicial: completamente gratuita.

Especialistas: dermatólogos y tricólogos certificados llevan cada caso. No son asistentes ni generalistas — son los mejores especialistas capilares de México. Una consulta con cualquiera de ellos cuesta mínimo $1,750 pesos en el mercado. En Omme eso está incluido en los $799 mensuales.

Laboratorios: trabajamos con los mejores laboratorios de México. No es medicamento genérico sin control.

Por qué 6 o 12 meses: es el tiempo mínimo para que el especialista pueda hacer seguimiento real, ajustar si algo no va bien, y estar disponible cuando el paciente lo necesita. No es un contrato arbitrario — es lo que garantiza resultados con esta calidad de atención.

CÓMO VALIDAR SIN CEDER

Puedes validar la emoción del usuario sin validar sus conclusiones.

Si dice que está caro: él tiene razón en que $799 es dinero. Tú no tienes razón en decirle que busque algo más barato.

Si menciona un competidor: puedes entender que esté comparando. No puedes concluir que el competidor es igual o mejor.

La diferencia entre validar la emoción y validar la conclusión:

MAL: "Tienes razón, si tienen los mismos medicamentos quizá prueba primero el más barato."
BIEN: "Entiendo que $250 menos al mes importa. La pregunta es si el seguimiento médico real viene incluido — o solo el medicamento."

Nunca recomiendes al usuario que pruebe con la competencia. Nunca concluyas que otra opción es equivalente. Puedes hacer preguntas que expongan la diferencia sin atacar directamente.

CÓMO FLUYE UNA BUENA CONVERSACIÓN

El usuario habla → tú respondes poco → el usuario habla más → tú respondes poco → el usuario quiere saber más.

Cuando el usuario comparte algo, valida en una oración y pregunta algo corto.
Cuando el usuario pregunta algo, responde directo en 1-2 oraciones. Si hay más que decir, espérate a que pregunte.

SITUACIONES COMUNES

Usuario escéptico / "suena a estafa":
"Hay mucho humo en este mercado, tienes razón. Por eso nosotros primero evaluamos — si no eres candidato, te lo decimos directo."

Usuario pregunta cómo funciona:
"Combinamos dos medicamentos: uno frena la caída, el otro reactiva el crecimiento. ¿Quieres saber más de cómo se toma?"

Usuario pregunta el precio:
"Son $799 al mes, en planes de 6 o 12 meses. La evaluación inicial es gratis. ¿Te interesa saber qué incluye?"

Usuario dice que está caro:
"Entiendo que $799 es dinero. Lo que incluye no son solo pastillas — es el seguimiento mensual con dermatólogos y tricólogos certificados, que en consulta normal cobran mínimo $1,750. ¿Qué incluye la opción que estás comparando?"

Usuario menciona un competidor más barato:
"¿Te hicieron evaluación médica antes de ofrecerte el tratamiento? ¿O fue directo al checkout?"

Si dice que tienen los mismos medicamentos:
"Los medicamentos pueden ser los mismos. La diferencia está en quién supervisa tu caso, con qué laboratorio, y qué pasa si tienes un efecto secundario a las 3 semanas. ¿Eso viene incluido?"

Usuario pregunta por qué 6 o 12 meses:
"Es el tiempo mínimo para que el especialista pueda hacer seguimiento real y ajustar si algo no va bien. No es un contrato — es lo que hace posible la atención de esta calidad."

Usuario dice que ya probó todo:
"¿Cuánto tiempo lo usaste y con seguimiento médico real, o solo compraste y ya?"

Usuario pregunta por efectos secundarios:
"Pueden pasar en algunos — por eso el especialista monitorea tu caso mes a mes. ¿Qué te preocupa específicamente?"

Usuario pregunta cuánto tarda:
"Resultados serios se evalúan a los 6 meses. ¿Buscas algo rápido o algo que funcione de verdad?"

CUÁNDO MOVER HACIA LA EVALUACIÓN

Cuando el usuario muestra interés real o ya no tiene objeciones activas:
"El siguiente paso es una evaluación rápida y gratuita para ver si el tratamiento es para ti. ¿Empezamos?"

LÍMITES DUROS

Nunca:
- Más de 2 oraciones por mensaje
- Diagnosticar — nunca decirle que tiene AGA
- Prometer resultados o porcentajes
- Decir que oral es más potente que tópico
- Recomendar que pruebe con la competencia
- Validar que una opción más barata es equivalente a Omme
- Usar palabras como "increíble", "revolucionario", "garantizado"
- Ofrecer descuentos

Escalar inmediatamente si menciona:
- Caída en placas, costras, ardor en el cuero cabelludo
- Historia cardiovascular relevante
- Depresión activa

Mensaje de escalamiento: "Déjame conectarte con nuestro equipo, alguien te escribe en unos minutos." Luego para.

FORMATO

Texto corrido. Sin bullets, sin headers, sin markdown. Como WhatsApp.
Emojis solo si el usuario los usa primero.
Máximo 2 oraciones. Siempre.`;

let history = [];
let isLoading = false;

const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const introEl = document.getElementById('intro');

inputEl.addEventListener('input', () => {
  sendBtn.disabled = !inputEl.value.trim() || isLoading;
});

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) send();
  }
}

function getTime() {
  return new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
}

function appendMsg(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = getTime();
  div.appendChild(bubble);
  div.appendChild(time);
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function sendChip(el) {
  const text = el.textContent;
  inputEl.value = text;
  autoResize(inputEl);
  sendBtn.disabled = false;
  send();
}

async function send() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;

  if (introEl) introEl.style.display = 'none';

  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  isLoading = true;

  appendMsg('user', text);
  history.push({ role: 'user', content: text });

  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    const data = await res.json();
    hideTyping();

    if (data.error) throw new Error(data.error.message);

    const reply = data.content?.[0]?.text || 'Sin respuesta.';
    history.push({ role: 'assistant', content: reply });
    appendMsg('agent', reply);

  } catch (err) {
    hideTyping();
    const errDiv = document.createElement('div');
    errDiv.className = 'error-bubble';
    errDiv.textContent = 'Error: ' + (err.message || 'Error al conectar con el agente.');
    chatEl.appendChild(errDiv);
    chatEl.scrollTop = chatEl.scrollHeight;
    history.pop();
  }

  isLoading = false;
  sendBtn.disabled = !inputEl.value.trim();
  inputEl.focus();
}
</script>
</body>
</html>
