<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><radialGradient id='g' cx='40%25' cy='35%25' r='60%25'><stop offset='0%25' stop-color='%2360A5FA'/><stop offset='50%25' stop-color='%232563EB'/><stop offset='100%25' stop-color='%23818CF8'/></radialGradient></defs><circle cx='16' cy='16' r='15' fill='url(%23g)'/></svg>">
<title>Omme — Salud masculina</title>
<style>
@keyframes spin  { 0%   { transform: rotate(0deg);   } 100% { transform: rotate(360deg); } }
@keyframes pulse { 0%, 100% { transform: scale(1);   } 50%  { transform: scale(1.03);   } }
@keyframes bop   { 0%,60%,100% { transform: translateY(0);   opacity: .3; }
                   30%          { transform: translateY(-5px); opacity: 1;  } }

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: #EDECEA;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
}

.chat-container {
  width: 100%;
  max-width: 420px;
  height: 100vh;
  max-height: 760px;
  display: flex;
  flex-direction: column;
  background: #EDECEA;
  border-radius: 32px;
  overflow: hidden;
  border: 1px solid rgba(0,0,0,0.07);
  box-shadow: 0 16px 56px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.07);
}

.chat-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 16px 13px;
  background: rgba(237,236,234,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(0,0,0,0.06);
  flex-shrink: 0;
}

.sphere-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(37,99,235,0.18);
  cursor: pointer;
}
.sphere-layer1 {
  position: absolute; inset: 0; border-radius: 50%;
  background: conic-gradient(from 0deg at 50% 50%,
    #2563EB 0deg, #06B6D4 80deg, #0EA5E9 130deg,
    #14B8A6 180deg, #818CF8 240deg, #60A5FA 290deg, #2563EB 360deg);
  animation: spin 7s linear infinite;
  filter: blur(3px);
}
.sphere-layer2 {
  position: absolute; inset: 0; border-radius: 50%;
  background:
    radial-gradient(ellipse 70% 60% at 30% 25%, rgba(255,255,255,0.22) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 70% 70%, rgba(99,102,241,0.40) 0%, transparent 55%);
  animation: pulse 4s ease-in-out infinite;
}
.sphere-layer3 {
  position: absolute; inset: 0; border-radius: 50%;
  background: radial-gradient(ellipse 40% 30% at 35% 30%, rgba(255,255,255,0.15) 0%, transparent 50%);
}

.brand-col { flex: 1; }
.brand-name {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.18em; color: #0d0d0d;
  text-transform: uppercase; display: block; line-height: 1;
}
.brand-sub {
  font-size: 8.5px; letter-spacing: 0.08em;
  color: rgba(13,13,13,0.38); text-transform: uppercase;
  display: block; margin-top: 3px;
}

.agent-pill {
  font-size: 8.5px; font-weight: 600; letter-spacing: 0.05em;
  padding: 3px 9px; border-radius: 4px;
  background: rgba(37,99,235,0.09); color: #1D4ED8;
  border: 1px solid rgba(37,99,235,0.16); text-transform: uppercase;
}

.live-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: #22C55E;
  box-shadow: 0 0 5px rgba(34,197,94,0.6);
}

.messages-container {
  flex: 1;
  padding: 16px 13px;
  display: flex;
  flex-direction: column;
  gap: 9px;
  overflow-y: auto;
  background: #EDECEA;
}

.timestamp {
  font-size: 9px; letter-spacing: 0.07em;
  color: rgba(13,13,13,0.28);
  text-align: center; text-transform: uppercase;
  margin: 2px 0 4px;
}

.bubble-agent {
  align-self: flex-start; max-width: 82%;
  background: linear-gradient(135deg, #EFF6FF, #DBEAFE);
  border-radius: 14px; border-top-left-radius: 3px;
  padding: 10px 13px;
  font-size: 12.5px; line-height: 1.56; color: #1e3a5f;
  box-shadow: 0 1px 6px rgba(37,99,235,0.08);
}

.bubble-user {
  align-self: flex-end; max-width: 72%;
  background: #ffffff;
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 14px; border-top-right-radius: 3px;
  padding: 10px 13px;
  font-size: 12.5px; line-height: 1.56; color: #1a1a1a;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}

.typing-indicator {
  align-self: flex-start;
  background: linear-gradient(135deg, #EFF6FF, #DBEAFE);
  border-radius: 14px; border-top-left-radius: 3px;
  padding: 11px 14px;
  display: flex; gap: 4px; align-items: center;
  box-shadow: 0 1px 6px rgba(37,99,235,0.08);
}
.typing-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: #93C5FD;
  animation: bop 1.4s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: .22s; }
.typing-dot:nth-child(3) { animation-delay: .44s; }

.human-takeover-banner {
  display: none;
  margin: 0 0 4px;
  padding: 9px 12px;
  background: rgba(37,99,235,0.06);
  border: 1px solid rgba(37,99,235,0.14);
  border-radius: 10px;
  font-size: 11.5px; color: #1D4ED8;
  text-align: center; line-height: 1.4;
}

.error-bubble {
  align-self: flex-start; max-width: 82%;
  background: #FEF2F2;
  border: 1px solid rgba(239,68,68,0.2);
  border-radius: 14px; border-top-left-radius: 3px;
  padding: 10px 13px;
  font-size: 12px; color: #B91C1C; line-height: 1.5;
}

.input-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 13px 16px;
  background: rgba(237,236,234,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(0,0,0,0.05);
  flex-shrink: 0;
}
.message-input {
  flex: 1;
  background: #fff;
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 22px;
  padding: 9px 14px;
  font-size: 12px;
  color: #0d0d0d;
  outline: none;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
}
.message-input::placeholder { color: rgba(13,13,13,0.30); }
.message-input:disabled { opacity: 0.5; cursor: not-allowed; }

.cta-button {
  background: #0d0d0d; color: #fff;
  font-size: 11px; font-weight: 600;
  padding: 9px 14px; border-radius: 22px;
  border: none; cursor: pointer;
  white-space: nowrap; letter-spacing: 0.02em;
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
  transition: opacity 0.15s;
}
.cta-button:hover { opacity: 0.85; }
.cta-button:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <div class="sphere-btn">
      <div class="sphere-layer1"></div>
      <div class="sphere-layer2"></div>
      <div class="sphere-layer3"></div>
    </div>
    <div class="brand-col">
      <span class="brand-name">omme</span>
      <span class="brand-sub">Salud masculina</span>
    </div>
    <span class="agent-pill" id="agent-badge">Advisor</span>
    <div class="live-dot"></div>
  </div>

  <div class="messages-container" id="messages">
    <div class="timestamp" id="chat-timestamp"></div>
    <div class="human-takeover-banner" id="human-takeover-banner">
      Un miembro de nuestro equipo te está atendiendo. Por favor espera.
    </div>
  </div>

  <div class="input-bar">
    <input
      type="text"
      class="message-input"
      id="message-input"
      placeholder="O escribe un mensaje..."
      autocomplete="off"
    />
    <button class="cta-button" id="send-btn">Empieza aquí</button>
  </div>
</div>

<script>
// ─── Estado global ────────────────────────────────────────────────────────────
let history             = [];
let isLoading           = false;
let userId              = localStorage.getItem('omme_user_id') || null;
let currentAgent        = localStorage.getItem('omme_current_agent') || 'agent_01';
let humanTakeoverActive = false;

const AGENT_NAMES = {
  agent_01: 'Advisor',
  agent_02: 'Triage',
  agent_03: 'Conversión',
  agent_04: 'Onboarding',
  agent_05: 'Seguimiento',
  agent_06: 'NPS',
  agent_07: 'Atención'
};

// ─── DOM ──────────────────────────────────────────────────────────────────────
const messagesEl  = document.getElementById('messages');
const inputEl     = document.getElementById('message-input');
const sendBtn     = document.getElementById('send-btn');
const agentBadge  = document.getElementById('agent-badge');
const tsEl        = document.getElementById('chat-timestamp');
const bannerEl    = document.getElementById('human-takeover-banner');

// ─── Init ─────────────────────────────────────────────────────────────────────
tsEl.textContent = 'Hoy · ' + new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
updateAgentBadge(currentAgent);

inputEl.addEventListener('input', () => {
  sendBtn.disabled = !inputEl.value.trim() || isLoading || humanTakeoverActive;
});
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !sendBtn.disabled) { e.preventDefault(); send(); }
});

// ─── Helpers UI ───────────────────────────────────────────────────────────────
function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function updateAgentBadge(agent) {
  currentAgent = agent;
  localStorage.setItem('omme_current_agent', agent);
  if (agentBadge) agentBadge.textContent = AGENT_NAMES[agent] || agent;
}

function addMessage(text, role) {
  const div = document.createElement('div');
  div.className = role === 'user' ? 'bubble-user' : 'bubble-agent';
  div.textContent = text;
  messagesEl.appendChild(div);
  scrollToBottom();
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing-indicator';
  div.id = 'typing';
  div.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  messagesEl.appendChild(div);
  scrollToBottom();
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function showError(msg) {
  const div = document.createElement('div');
  div.className = 'error-bubble';
  div.textContent = msg;
  messagesEl.appendChild(div);
  scrollToBottom();
}

function disableInputForHumanTakeover() {
  humanTakeoverActive = true;
  inputEl.disabled = true;
  sendBtn.disabled = true;
  bannerEl.style.display = 'block';
}

// ─── Send ─────────────────────────────────────────────────────────────────────
async function send() {
  const text = inputEl.value.trim();
  if (!text || isLoading || humanTakeoverActive) return;

  inputEl.value = '';
  sendBtn.disabled = true;
  isLoading = true;

  addMessage(text, 'user');
  history.push({ role: 'user', content: text });

  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages:            history,
        userId:              userId,
        conversationHistory: history
      })
    });

    const data = await res.json();
    hideTyping();

    if (data.error) throw new Error(data.error.message);

    // Persistir userId si el backend lo generó
    if (data.userId && data.userId !== userId) {
      userId = data.userId;
      localStorage.setItem('omme_user_id', userId);
    }

    // Actualizar badge del agente
    if (data.currentAgent) {
      updateAgentBadge(data.currentAgent);
    }

    // Human takeover
    if (data.human_takeover) {
      const msg = data.message || 'Un miembro de nuestro equipo te está atendiendo. Por favor espera.';
      addMessage(msg, 'agent');
      disableInputForHumanTakeover();
      isLoading = false;
      return;
    }

    const reply = data.content?.[0]?.text || 'Sin respuesta.';
    history.push({ role: 'assistant', content: reply });
    addMessage(reply, 'agent');

  } catch (err) {
    hideTyping();
    showError('Error: ' + (err.message || 'No se pudo conectar con el agente.'));
    history.pop();
  }

  isLoading = false;
  sendBtn.disabled = !inputEl.value.trim() || humanTakeoverActive;
  inputEl.focus();
}
</script>
</body>
</html>
